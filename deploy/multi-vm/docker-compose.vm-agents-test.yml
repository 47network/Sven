# Dedicated Agent Test VM — Isolated sandbox for Feature Tester + Imagination agents
# Safe experimentation without affecting production. Full Sven stack in sandbox mode.
# Usage: docker compose -f docker-compose.vm-agents-test.yml up -d

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: sven-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: sven_test
      POSTGRES_PASSWORD: ${AGENTS_TEST_DB_PASSWORD:-sven_test_local}
      POSTGRES_DB: sven_test
    volumes:
      - agents-test-pgdata:/var/lib/postgresql/data
    networks:
      - sven-agents-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sven_test -d sven_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  nats-test:
    image: nats:2.10-alpine
    container_name: sven-nats-test
    restart: unless-stopped
    command: >
      -js
      -sd /data
      --max_payload 1048576
      --server_name sven-agents-test
    volumes:
      - agents-test-natsdata:/data
    networks:
      - sven-agents-test
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  gateway-api-test:
    image: ${REGISTRY:-sven}/gateway-api:${GATEWAY_API_TAG:-latest}
    container_name: sven-gateway-api-test
    restart: unless-stopped
    depends_on:
      postgres-test:
        condition: service_healthy
      nats-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: "3000"
      DATABASE_URL: postgres://sven_test:${AGENTS_TEST_DB_PASSWORD:-sven_test_local}@postgres-test:5432/sven_test
      NATS_URL: nats://nats-test:4222
      JWT_SECRET: ${AGENTS_TEST_JWT_SECRET:-agents-test-jwt-secret-do-not-use-in-prod}
      SVEN_COMMUNITY_ACCESS_MODE: verified_persona_only
      SVEN_COMMUNITY_MODERATION_MODE: strict
      SVEN_COMMUNITY_AGENT_POST_POLICY: reviewed_only
      SVEN_AGENT_TEST_MODE: "true"
      LOG_LEVEL: debug
    networks:
      - sven-agents-test
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      com.sven.role: agent-test-sandbox
      com.sven.isolation: full

volumes:
  agents-test-pgdata:
    driver: local
  agents-test-natsdata:
    driver: local

networks:
  sven-agents-test:
    driver: bridge
    name: sven-agents-test
    internal: false
