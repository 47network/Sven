name: bridge-runtime-tests

on:
  workflow_dispatch:
    inputs:
      runner_target:
        description: 'Runner label (ubuntu-latest or self-hosted)'
        required: false
        default: 'ubuntu-latest'
  pull_request:
    paths:
      - 'services/bridge-47dynamics/**'
      - '.github/workflows/bridge-runtime-tests.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'services/bridge-47dynamics/**'
      - '.github/workflows/bridge-runtime-tests.yml'


permissions:
  contents: read
jobs:
  bridge-tests:
    runs-on: ${{ github.event.inputs.runner_target || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared and pillar packages
        run: |
          pnpm --filter ./packages/shared run build
          for pkg in compute-mesh model-router security-toolkit document-intel marketing-intel proactive-notifier quantum-sim design-system; do
            pnpm --filter ./packages/$pkg run build
          done

      - name: Run bridge-47dynamics tests
        continue-on-error: true
        run: |
          if [ -f services/bridge-47dynamics/package.json ]; then
            pnpm --filter ./services/bridge-47dynamics run test -- --runInBand --forceExit
          else
            echo "⚠ bridge-47dynamics package not initialised — gate passes as provisional"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-runtime-test-results
          path: |
            services/bridge-47dynamics/coverage/
            docs/release/status/bridge-*-latest.json
