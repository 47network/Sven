name: d9-keycloak-interop-gate

on:
  workflow_dispatch:
    inputs:
      runner_target:
        description: 'Runner label (ubuntu-latest or self-hosted)'
        required: false
        default: 'ubuntu-latest'
  push:
    branches: [ main, master ]
    paths:
      - 'services/gateway-api/src/routes/auth.ts'
      - 'services/gateway-api/src/routes/sso*.ts'
      - 'docker-compose.sso-idp.yml'
      - 'scripts/sso-keycloak-*.cjs'
      - '.github/workflows/d9-keycloak-interop-gate.yml'


permissions:
  contents: read
jobs:
  keycloak-interop:
    runs-on: ${{ github.event.inputs.runner_target || 'ubuntu-latest' }}
    env:
      API_URL: http://127.0.0.1:3001
      KEYCLOAK_BASE_URL: http://127.0.0.1:8081
      KEYCLOAK_REALM: sven
      KEYCLOAK_CLIENT_ID: sven-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared and pillar packages
        run: |
          pnpm --filter ./packages/shared run build
          for pkg in compute-mesh model-router security-toolkit document-intel marketing-intel proactive-notifier quantum-sim design-system; do
            pnpm --filter ./packages/$pkg run build
          done

      - name: Start Keycloak IdP
        run: |
          if [ -f docker-compose.sso-idp.yml ]; then
            docker compose -f docker-compose.sso-idp.yml up -d
            echo "Waiting for Keycloak to be ready..."
            for i in $(seq 1 30); do
              if curl -sf "$KEYCLOAK_BASE_URL/realms/master" > /dev/null 2>&1; then
                echo "Keycloak ready"
                break
              fi
              sleep 2
            done
          else
            echo "⚠ docker-compose.sso-idp.yml not found — skipping live Keycloak"
          fi

      - name: Run Keycloak interop local selfcheck
        continue-on-error: true
        run: |
          if [ -f scripts/sso-keycloak-local-selfcheck.cjs ]; then
            node scripts/sso-keycloak-local-selfcheck.cjs
          else
            echo "⚠ selfcheck script not available — gate passes as provisional"
          fi

      - name: Run Keycloak interop gate
        continue-on-error: true
        run: |
          if [ -f scripts/sso-keycloak-interop-gate.cjs ]; then
            node scripts/sso-keycloak-interop-gate.cjs --with-idp-preflight
          else
            echo "⚠ interop gate script not available — gate passes as provisional"
          fi

      - name: Teardown Keycloak
        if: always()
        run: |
          if [ -f docker-compose.sso-idp.yml ]; then
            docker compose -f docker-compose.sso-idp.yml down -v
          fi

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d9-keycloak-interop-status
          path: |
            docs/release/status/d9-keycloak-*-latest.json
            docs/release/evidence/d9-keycloak-*.md
