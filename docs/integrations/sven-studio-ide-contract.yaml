schema_version: 1
generated_at: 2026-04-18
document_type: sven_studio_ide_integration_contract
target: sven_studio_ide
public_api_contract_version: 2026-02-16.v1
public_api_contract_surfaces:
  - auth
  - chat
  - approvals
  - admin
  - stats
  - preferences
sources:
  repo_routes:
    - services/gateway-api/src/routes/auth.ts
    - services/gateway-api/src/routes/canvas.ts
    - services/gateway-api/src/routes/search.ts
    - services/gateway-api/src/routes/streams.ts
    - services/gateway-api/src/routes/deployment.ts
    - services/gateway-api/src/routes/admin/git.ts
    - apps/canvas-ui/src/lib/api.ts
    - packages/shared/src/sdk/http-client.ts
  infra_reference: user_supplied_47_infrastructure_reference_april_2026

auth:
  session_model:
    accepted_credentials:
      - type: cookie
        name: sven_session
      - type: bearer
        description: opaque_sven_session_id
    rejected_assumptions:
      - raw_keycloak_access_tokens_are_not_accepted_directly_on_protected_v1_routes
  cookies:
    session_cookie: sven_session
    refresh_cookie: sven_refresh
  ttl_seconds:
    access_token: 604800
    refresh_token: 7776000
  keycloak_defaults:
    base_url: http://127.0.0.1:8081
    realm: sven
    client_id: sven-gateway
  flows:
    sso_status:
      method: GET
      path: /v1/auth/sso/status
      auth: optional
      response_fields:
        - organization_id
        - config
        - providers
        - local_auth_available
    local_login:
      method: POST
      path: /v1/auth/login
      follow_up:
        - POST /v1/auth/totp/verify
    oidc_direct_exchange:
      method: POST
      path: /v1/auth/sso
      request:
        required_fields:
          - provider
          - id_token
        optional_fields:
          - account_id
          - nonce
        required_values:
          provider: oidc
      response_fields:
        - provider
        - user_id
        - username
        - role
        - membership_role
        - active_organization_id
        - access_token
        - refresh_token
        - token_type
        - expires_in
    oidc_browser_flow:
      start:
        method: POST
        path: /v1/auth/sso/oidc/start
        request:
          required_fields:
            - account_id
        response_fields:
          - provider
          - account_id
          - authorization_url
          - state
          - expires_in_seconds
      callback:
        method: POST
        path: /v1/auth/sso/oidc/callback
        request:
          required_fields:
            - state
            - code
        notes:
          - redirect_uri_is_not_client_overrideable_on_callback
          - configured_org_callback_url_is_used
    device_flow:
      start:
        method: POST
        path: /v1/auth/device/start
        request:
          optional_fields:
            - client_name
            - client_type
            - scope
        response_fields:
          - device_code
          - user_code
          - verification_uri
          - verification_uri_complete
          - expires_in
          - interval
      confirm:
        method: POST
        path: /v1/auth/device/confirm
        auth: active_session_required
        request:
          required_fields:
            - user_code
      token:
        method: POST
        path: /v1/auth/device/token
        request:
          required_fields:
            - device_code
        response_states:
          - pending_status_returned_when_not_yet_approved
          - authorized_returns_access_and_refresh_tokens
    token_exchange:
      method: GET
      path: /v1/auth/token-exchange
      query:
        required:
          - token
        optional:
          - redirect
    refresh:
      method: POST
      path: /v1/auth/refresh
      request:
        accepted_fields:
          - refresh_token
          - refreshToken
        also_accepts_cookie: sven_refresh
      response_fields:
        - access_token
        - refresh_token
        - token_type
        - expires_in
  multi_org:
    list:
      method: GET
      path: /v1/users/me/organizations
    activate:
      method: PUT
      path: /v1/users/me/active-organization
      request:
        required_fields:
          - organization_id
    requirement:
      most_chat_run_approval_and_search_routes_require_active_organization: true

recommended_studio_path:
  - authenticate_with_device_flow_or_oidc_exchange
  - list_orgs_and_set_active_org
  - create_or_reuse_chat
  - send_work_via_post_v1_chats_chatId_messages
  - subscribe_to_sse_via_v1_stream_or_chat_specific_stream
  - resolve_runs_artifacts_approvals_and_search_from_existing_public_routes

public_endpoints:
  health:
    - method: GET
      path: /healthz
    - method: GET
      path: /readyz
    - method: GET
      path: /v1/contracts/version
  identity:
    - method: GET
      path: /v1/me
      response_fields:
        - id
        - username
        - display_name
        - role
        - created_at
        - active_organization_id
    - method: GET
      path: /v1/auth/me
      response_fields:
        - id
        - username
        - display_name
        - bio
        - avatar_url
        - timezone
        - status_emoji
        - status_text
        - role
        - created_at
        - active_organization_id
        - active_organization_name
        - active_organization_slug
  chats:
    - method: GET
      path: /v1/chats
    - method: POST
      path: /v1/chats
    - method: GET
      path: /v1/chats/:chatId
    - method: PATCH
      path: /v1/chats/:chatId
    - method: DELETE
      path: /v1/chats/:chatId
    - method: GET
      path: /v1/chats/:chatId/messages
    - method: POST
      path: /v1/chats/:chatId/messages
      request_fields:
        required:
          - text
        optional:
          - mode
          - response_length
          - personality
          - memory_context
          - reply_to_message_id
      behavior:
        direct_dispatch:
          status_code: 201
          fields:
            - status
            - queued
        queued_dispatch:
          status_code: 202
          fields:
            - status
            - queued
            - queue_id
            - queue_position
        queue_full:
          status_code: 429
          error_code: QUEUE_DEPTH_EXCEEDED
      event_bus:
        publish_subject: inbound.message.canvas
    - method: DELETE
      path: /v1/chats/:chatId/queue/:queueId
    - method: GET
      path: /v1/chats/:chatId/agent-state
    - method: POST
      path: /v1/chats/:chatId/agent/pause
    - method: POST
      path: /v1/chats/:chatId/agent/resume
    - method: POST
      path: /v1/chats/:chatId/agent/nudge
  runs:
    - method: GET
      path: /v1/runs/:runId
      response_fields:
        - id
        - tool_name
        - chat_id
        - user_id
        - approval_id
        - status
        - prev_hash
        - run_hash
        - canonical_io_sha256
        - duration_ms
        - created_at
        - completed_at
        - context_message_id
        - linked_artifacts
  artifacts:
    - method: GET
      path: /v1/artifacts/:artifactId
      response_fields:
        - id
        - chat_id
        - message_id
        - name
        - mime_type
        - size_bytes
        - created_at
        - is_private
        - download_url
    - method: GET
      path: /v1/artifacts/:artifactId/download
  approvals:
    - method: GET
      path: /v1/approvals
      filters:
        - status
        - chat_id
        - query
        - requester
        - limit
        - offset
    - method: GET
      path: /v1/approvals/export
      filters:
        - status
        - chat_id
        - query
        - requester
        - max_rows
        - format
    - method: POST
      path: /v1/approvals/:id/vote
      request_fields:
        required:
          - decision
      allowed_values:
        decision:
          - approve
          - deny
          - reject
      event_bus:
        publish_subject: approval.updated
  search:
    - method: POST
      path: /v1/search
      description: federated_messages_tool_runs_artifacts_search
    - method: POST
      path: /v1/search/messages
      description: full_text_message_search
    - method: POST
      path: /v1/search/semantic
      request_requirements:
        embedding_dimension: 1536
    - method: POST
      path: /v1/search/unified
      supported_scopes:
        - messages
        - files
        - contacts
  realtime:
    - method: GET
      path: /v1/stream
      transport: sse
      event_names:
        - message
        - approval
        - agent.paused
        - agent.resumed
        - agent.nudged
    - method: GET
      path: /v1/chats/:chatId/a2ui/stream
      transport: sse
    - method: POST
      path: /v1/streams
      description: create_resumable_owned_stream
    - method: POST
      path: /v1/streams/:id/events
      description: append_stream_event
    - method: GET
      path: /v1/streams/:id/events
      description: poll_stream_events
    - method: GET
      path: /v1/streams/:id/sse
      transport: sse
      supports_last_event_id: true
  deployment:
    - method: GET
      path: /v1/config/deployment
      response_fields:
        - mode
        - setup_complete
    - method: POST
      path: /v1/config/deployment/setup
      request_fields:
        required:
          - mode
          - username
          - password
        optional:
          - display_name
      valid_mode_values:
        - personal
        - multi_user

admin_only:
  deployment:
    - method: PUT
      path: /v1/admin/deployment
  events:
    - method: GET
      path: /v1/admin/events
      transport: sse
      event_names:
        - approval.changed
        - tool_run.changed
        - chat.changed
        - user.changed
        - health.status
        - health.degraded
  git:
    providers:
      - local
      - forgejo
      - github
    routes:
      - method: POST
        path: /v1/admin/git/repos
      - method: GET
        path: /v1/admin/git/repos/:id/status
      - method: POST
        path: /v1/admin/git/repos/:id/sync
      - method: GET
        path: /v1/admin/git/repos/:id/pull-requests
      - method: POST
        path: /v1/admin/git/repos/:repo_id/pull-requests/:pr_id/merge
    provider_requirements:
      forgejo:
        required_fields:
          - repoOwner
          - tokenRef
          - repoUrl
          - baseUrl
      github:
        required_fields:
          - repoOwner
          - tokenRef
          - repoUrl
      local:
        repoUrl_must_be_filesystem_path: true
    restrictions:
      repo_url_must_be_http_or_https_for_forgejo_and_github: true
      blocked_hosts:
        - localhost
        - 127.0.0.1
        - ::1
        - 0.0.0.0
        - metadata.google.internal
        - 169.254.169.254
        - rfc1918_private_ipv4_ranges
      protected_branch_merge_requires_explicit_approval: true
      protected_branch_names:
        - main
        - master
  editor:
    routes:
      - /v1/admin/editor/tree
      - /v1/admin/editor/file
      - /v1/admin/editor/mkdir
      - /v1/admin/editor/rename
      - /v1/admin/editor/search
      - /v1/admin/editor/git/status
      - /v1/admin/editor/git/diff
  agents:
    routes:
      - /v1/admin/agents
      - /v1/admin/agents/:id/config
      - /v1/admin/agents/:id/spawn-session
      - /v1/admin/agents/sessions/list
      - /v1/admin/agents/sessions/:sessionId/history
      - /v1/admin/agents/sessions/send

knowledge_base:
  public_ingestion_api_present: false
  current_public_search_contract:
    federated_search: /v1/search
    full_text_search: /v1/search/messages
