# External Nginx site (trading host): trading.sven.systems
#
# TOPOLOGY VARIANT: standalone single-host edge.
#   Use this file ONLY when the same host runs both the public TLS edge
#   AND the trading-ui Next.js process on 127.0.0.1:3300.
#
# DO NOT USE this file in the multi-VM topology where the public edge
# (e.g. 47Dynamics, 82.137.24.36) terminates only L4 / SNI-routes to a
# separate Sven platform VM. In that topology the edge runs no HTTP vhost
# for trading; it L4-forwards to VM4 (which terminates TLS itself with
# `listen 443 ssl proxy_protocol`). Use
# `extnginx-sven-trading.l4-passthrough.conf` and the runbook
# `docs/runbooks/edge-trading-sni-passthrough.md` for that case.
#
# Internal target (this file): 127.0.0.1:3300 (trading-ui Next.js via PM2)
#
# Requires global zone definitions in nginx http{} context:
# limit_req_zone  $binary_remote_addr  zone=sven_global_per_ip:10m  rate=30r/s;
# limit_req_zone  $binary_remote_addr  zone=sven_auth_per_ip:10m    rate=10r/m;
# limit_conn_zone $binary_remote_addr  zone=sven_conn_per_ip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name trading.sven.systems;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name trading.sven.systems;
    limit_conn sven_conn_per_ip 30;

    ssl_certificate /etc/nginx/ssl/trading.sven.systems/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/trading.sven.systems/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    location ^~ /.well-known/acme-challenge/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:9147;
    }

    # WebSocket upgrade support (SSE trading events)
    location /v1/trading/events {
        limit_req zone=sven_global_per_ip burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_pass http://127.0.0.1:3000;
    }

    # Gateway API passthrough
    location /v1/ {
        limit_req zone=sven_global_per_ip burst=60 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
        proxy_pass http://127.0.0.1:3000;
    }

    # Next.js trading-ui
    location / {
        limit_req zone=sven_global_per_ip burst=120 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
        proxy_pass http://127.0.0.1:3300;
    }
}
