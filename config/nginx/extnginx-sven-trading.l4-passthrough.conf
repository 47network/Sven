# External Nginx — L4 SNI passthrough for trading.sven.systems
#
# TOPOLOGY VARIANT: multi-VM edge (default Sven prod).
#   Use this snippet on the public edge host (e.g. 47Dynamics, 82.137.24.36)
#   when:
#     - The edge does NOT terminate TLS for *.sven.systems vhosts.
#     - The Sven platform VM (VM4, default upstream below) terminates TLS
#       itself and accepts PROXY-protocol on 443:
#           listen 443 ssl proxy_protocol;
#     - The edge already L4-routes sven.systems and app.sven.systems to
#       the same backend (this file only adds trading.sven.systems to that
#       same SNI map).
#
# This snippet must live inside the edge nginx top-level `stream {}` block.
# It REQUIRES the `ngx_stream_ssl_preread_module` (compiled into the
# stock nginx package). It does NOT terminate TLS — the cert lives on
# VM4 only (already provisioned at /etc/letsencrypt/live/trading.sven.systems/).
#
# How to apply (edge):
#   1) Place / merge this file into the edge nginx config tree such that
#      the `stream {}` block is included (typical paths:
#      /etc/nginx/nginx.conf  or  /etc/nginx/streams.d/sven-l4.conf).
#   2) If the edge already has an SNI passthrough map for sven.systems
#      and app.sven.systems, just add the single line:
#           trading.sven.systems   sven_platform_https;
#      to the existing `map $ssl_preread_server_name $upstream` block.
#   3) `nginx -t && systemctl reload nginx`
#   4) Verify (from anywhere on the public internet):
#           curl -sI https://trading.sven.systems/ -m 10
#      Expect HTTP/1.1 200 with `server: nginx` and `strict-transport-security`.
#
# Full reference runbook: docs/runbooks/edge-trading-sni-passthrough.md

stream {
    # PROXY protocol forwarding to the Sven platform VM. The destination
    # VM nginx (VM4 / sven-nginx container) terminates TLS and reads the
    # original client IP / TLS-SNI from the PROXY v1 header.
    #
    # Replace 10.47.47.8 with the actual edge<->platform transit IP if
    # different on your deployment (e.g. 192.168.7.59 for the 47Dynamics
    # transit network used by app.sven.systems).
    upstream sven_platform_https {
        server 10.47.47.8:443;
    }

    # SNI map. If the edge already has an equivalent map for the other
    # *.sven.systems names, add only the trading.sven.systems line and
    # do not duplicate this map block.
    map $ssl_preread_server_name $sven_l4_upstream {
        default                   sven_platform_https;
        sven.systems              sven_platform_https;
        app.sven.systems          sven_platform_https;
        trading.sven.systems      sven_platform_https;
        talk.sven.systems         sven_platform_https;
        deception.sven.systems    sven_platform_https;
        auth.deception.sven.systems sven_platform_https;
        wa.sven.systems           sven_platform_https;
        misiuni.from.sven.systems sven_platform_https;
    }

    # L4 listener. ssl_preread reads the SNI from the TLS ClientHello
    # without terminating TLS, then proxies the raw TCP stream to VM4
    # with a PROXY v1 header so VM4 sees the real client IP.
    server {
        listen 443;
        listen [::]:443;

        ssl_preread       on;
        proxy_protocol    on;
        proxy_pass        $sven_l4_upstream;

        proxy_connect_timeout 5s;
        proxy_timeout         86400s; # long-lived for SSE / websockets

        # Optional: fail-fast log on missing SNI / unknown name.
        # access_log /var/log/nginx/sven-l4-access.log;
        error_log  /var/log/nginx/sven-l4-error.log warn;
    }
}
